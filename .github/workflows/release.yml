name: Release Desktop App

# Build the desktop app for Windows / macOS / Linux in the cloud and publish
# the installers to a single GitHub Release. The published feed files
# (latest*.yml + blockmaps) are what electron-updater reads for auto-update.
#
# Public repo → GitHub-hosted runners (incl. macOS) are free with no minute cap.
#
# Per-platform notes:
#   - Windows: nsis installer; auto-update works.
#   - Linux:   AppImage + deb; AppImage auto-update works.
#   - macOS:   dmg, UNSIGNED — Gatekeeper will warn ("unidentified developer";
#              right-click → Open, or `xattr -cr <app>`), and auto-update does
#              NOT work without an Apple Developer signature. Intended for
#              personal use until signing/notarization is set up.
#
# Trigger: push a version tag (git tag v1.0.2 && git push origin v1.0.2),
# or run manually from the Actions tab.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # required for electron-builder to create the GitHub Release

jobs:
  release:
    strategy:
      fail-fast: false # one platform failing must not cancel the others
      matrix:
        include:
          - os: windows-latest
            script: release:win
          - os: macos-latest
            script: release:mac
          - os: ubuntu-latest
            script: release:linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop (root) dependencies
        run: npm install

      - name: Install backend dependencies (esbuild bundle)
        run: npm --prefix server install

      - name: Install web dependencies
        run: npm --prefix web install

      - name: Build and publish installer
        env:
          # Provided automatically by Actions; electron-builder uses it both to
          # create the Release and to infer owner/repo for the update feed.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple/Windows signing certs configured — don't let electron-builder
          # hunt for one and fail; build unsigned (see header note for macOS).
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run ${{ matrix.script }}

      - name: Assert the auto-update feed was generated
        shell: bash
        # app-update.yml is what electron-updater reads at runtime to find new
        # releases. electron-builder only emits it once it can resolve the GitHub
        # repo (inferred from the checkout's git remote). Fail loudly if missing
        # rather than shipping a build whose auto-update silently never works.
        run: |
          f=$(find dist-electron -name app-update.yml | head -1)
          if [ -z "$f" ]; then
            echo "::error::app-update.yml missing on ${{ matrix.os }} — auto-update feed was not generated."
            exit 1
          fi
          echo "auto-update feed OK ($f):"; cat "$f"

      - name: Publish the release (electron-builder uploads it as a draft)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --draft=false --latest
